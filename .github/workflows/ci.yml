name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff
      - name: Lint (ruff)
        run: ruff check src tests
      - name: Tests
        run: pytest --cov=src --cov-report=term-missing

  ai-worker:
    name: AI Worker — lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Only the light deps the unit tests need — ultralytics/torch/opencv
      # are runtime-only and far too heavy for CI test jobs.
      - name: Install test dependencies
        run: |
          pip install pytest pytest-asyncio pydantic-settings structlog ruff
      - name: Lint (ruff)
        run: ruff check src/pipeline/ppe_validator.py src/pipeline/types.py src/config tests
      - name: Tests
        run: pytest

  frontend:
    name: Frontend — type-check + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type-check + build
        run: npm run build
