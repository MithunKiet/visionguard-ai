global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: visionguard-backend
    static_configs:
      - targets: ['backend:8000']
    metrics_path: /metrics

  - job_name: visionguard-ai-worker
    static_configs:
      - targets: ['ai-worker:8001']
    metrics_path: /metrics
