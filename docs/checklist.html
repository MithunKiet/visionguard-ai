<!doctype html>
<title>VisionGuard AI — Module Checklist</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0D1117;
    --surface:   #161B22;
    --surface2:  #1C2333;
    --border:    #30363D;
    --text:      #E6EDF3;
    --muted:     #7D8590;
    --green:     #3FB950;
    --green-dim: #1A3A22;
    --amber:     #D29922;
    --amber-dim: #2D2008;
    --blue:      #388BFD;
    --blue-dim:  #0D2149;
    --red:       #F85149;
    --mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }

  .logo-mark {
    width: 32px; height: 32px;
    background: var(--green);
    border-radius: 6px;
    display: grid;
    place-items: center;
    flex-shrink: 0;
  }

  .logo-mark svg { width: 18px; height: 18px; }

  header h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  header span {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
  }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .overall-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
  }

  .bar-track {
    width: 120px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: var(--green);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .overall-pct {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--green);
    font-variant-numeric: tabular-nums;
    min-width: 32px;
  }

  /* ── Layout ── */
  .layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    flex: 1;
    min-height: 0;
  }

  /* ── Sidebar ── */
  aside {
    border-right: 1px solid var(--border);
    padding: 20px 0;
    position: sticky;
    top: 57px;
    height: calc(100vh - 57px);
    overflow-y: auto;
  }

  .aside-section {
    padding: 0 12px 20px;
  }

  .aside-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 8px;
    margin-bottom: 6px;
  }

  .phase-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 7px 8px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s, color 0.15s;
  }

  .phase-btn:hover { background: var(--surface); color: var(--text); }

  .phase-btn.active {
    background: var(--surface2);
    color: var(--text);
  }

  .phase-ring {
    flex-shrink: 0;
    position: relative;
  }

  .phase-ring svg { display: block; transform: rotate(-90deg); }

  .phase-ring circle { fill: none; }

  .ring-bg { stroke: var(--border); stroke-width: 2.5; }

  .ring-fill { stroke-width: 2.5; stroke-linecap: round; transition: stroke-dashoffset 0.5s ease; }

  .phase-btn-label { flex: 1; line-height: 1.2; }

  .phase-count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  /* ── Main ── */
  main {
    padding: 24px;
    overflow-y: auto;
  }

  .phase-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 20px;
  }

  .phase-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .phase-subtitle {
    font-size: 12px;
    color: var(--muted);
  }

  .phase-badge {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 20px;
    font-variant-numeric: tabular-nums;
  }

  /* ── Module Grid ── */
  .module-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }

  .module-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .module-card:hover { border-color: #484F58; }

  .module-card.status-done { border-left: 3px solid var(--green); }
  .module-card.status-progress { border-left: 3px solid var(--amber); }
  .module-card.status-pending { border-left: 3px solid var(--border); }

  .module-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px 12px;
    cursor: pointer;
    user-select: none;
  }

  .module-icon {
    width: 30px; height: 30px;
    border-radius: 6px;
    display: grid;
    place-items: center;
    flex-shrink: 0;
    font-size: 14px;
  }

  .module-meta { flex: 1; min-width: 0; }

  .module-name {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .module-code {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    margin-top: 1px;
  }

  .module-progress {
    text-align: right;
    flex-shrink: 0;
  }

  .progress-frac {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  .module-mini-bar {
    width: 60px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 4px;
    margin-left: auto;
  }

  .module-mini-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .chevron {
    flex-shrink: 0;
    color: var(--muted);
    transition: transform 0.2s;
  }

  .module-card.open .chevron { transform: rotate(180deg); }

  .task-list {
    display: none;
    padding: 0 16px 14px;
    border-top: 1px solid var(--border);
  }

  .module-card.open .task-list { display: block; }

  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }

  .task-item:last-child { border-bottom: none; }

  .task-item input[type="checkbox"] { display: none; }

  .check-box {
    width: 16px; height: 16px;
    border-radius: 4px;
    border: 1.5px solid var(--border);
    flex-shrink: 0;
    margin-top: 1px;
    display: grid;
    place-items: center;
    transition: background 0.15s, border-color 0.15s;
  }

  .task-item.checked .check-box {
    background: var(--green);
    border-color: var(--green);
  }

  .task-item.checked .check-box::after {
    content: '';
    width: 9px; height: 6px;
    border-left: 2px solid #000;
    border-bottom: 2px solid #000;
    transform: translateY(-1px) rotate(-45deg);
    display: block;
  }

  .task-label {
    font-size: 12.5px;
    color: var(--text);
    line-height: 1.4;
    transition: color 0.15s;
    flex: 1;
  }

  .task-item.checked .task-label {
    color: var(--muted);
    text-decoration: line-through;
    text-decoration-color: var(--border);
  }

  .task-tag {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  /* Status colors */
  .done-badge { background: var(--green-dim); color: var(--green); }
  .prog-badge { background: var(--amber-dim); color: var(--amber); }
  .pend-badge { background: var(--surface2); color: var(--muted); }

  /* Phase section divider */
  .section-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 28px 0 16px;
  }

  .section-divider h2 {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Vertical slice special card */
  .slice-card {
    background: linear-gradient(135deg, #0D2149 0%, #1A3A22 100%);
    border: 1px solid #2A4060;
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 12px;
  }

  .slice-card h3 {
    font-size: 13px;
    font-weight: 700;
    color: var(--blue);
    margin-bottom: 12px;
    letter-spacing: -0.01em;
  }

  .slice-steps {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
  }

  .slice-step {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    background: rgba(56,139,253,0.12);
    color: var(--blue);
    cursor: pointer;
    border: 1px solid rgba(56,139,253,0.2);
    transition: background 0.15s;
  }

  .slice-step.checked {
    background: rgba(63,185,80,0.15);
    color: var(--green);
    border-color: rgba(63,185,80,0.25);
    text-decoration: line-through;
    text-decoration-color: rgba(63,185,80,0.4);
  }

  .slice-arrow {
    color: var(--muted);
    font-size: 10px;
    flex-shrink: 0;
  }

  .slice-gate {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid rgba(56,139,253,0.15);
    font-size: 11px;
    color: var(--muted);
  }

  .slice-gate strong { color: var(--amber); }

  /* Reset btn */
  .reset-btn {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 5px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .reset-btn:hover { color: var(--red); border-color: var(--red); }

  @media (max-width: 700px) {
    .layout { grid-template-columns: 1fr; }
    aside { display: none; }
    main { padding: 16px; }
    .module-grid { grid-template-columns: 1fr; }
  }
</style>

<header>
  <div class="logo-mark">
    <svg viewBox="0 0 18 18" fill="none">

    <button class="reset-btn" onclick="resetAll()">Reset</button>
  </div>
</header>

<div class="layout">
  <aside id="sidebar"></aside>
  <main id="main"></main>
</div>

// ── State ──────────────────────────────────────────────────────────────────
const KEY = "vg_checklist_v1";

function loadState() {
  try { return JSON.parse(localStorage.getItem(KEY) || "{}"); } catch { return {}; }
}

function saveState(state) {
  localStorage.setItem(KEY, JSON.stringify(state));
}

function resetAll() {
  if (confirm("Reset all checkboxes?")) {
    localStorage.removeItem(KEY);
    location.reload();
  }
}

let state = loadState();

// Pre-fill foundation tasks as done
DATA.phases[0].modules.forEach(m =>
  m.tasks.forEach(t => { if (t.done && state[t.id] === undefined) state[t.id] = true; })
);

// ── Vertical slice tasks ──────────────────────────────────────────────────
const SLICE = [
  { id: "vs1", label: "docker-compose up -d postgres redis rabbitmq minio mediamtx" },
  { id: "vs2", label: "alembic upgrade head" },
  { id: "vs3", label: "Backend /health/ready → ok" },
  { id: "vs4", label: "FFmpeg → MediaMTX fake RTSP stream" },
  { id: "vs5", label: "AI Worker connects + detects violation" },
  { id: "vs6", label: "RabbitMQ event received by backend" },
  { id: "vs7", label: "Violation saved in ppe.violations" },
  { id: "vs8", label: "Alert created in alerts.alerts" },
  { id: "vs9", label: "WebSocket push → React dashboard" },
  { id: "vs10", label: "End-to-end latency ≤ 5 seconds ✓" },
];

// ── Render ─────────────────────────────────────────────────────────────────
function getTaskDone(id) { return !!state[id]; }

function setTaskDone(id, val) {
  state[id] = val;
  saveState(state);
}

function moduleStats(mod) {
  const total = mod.tasks.length;
  const done = mod.tasks.filter(t => getTaskDone(t.id)).length;
  return { total, done };
}

function phaseStats(phase) {
  let total = 0, done = 0;
  phase.modules.forEach(m => {
    const s = moduleStats(m);
    total += s.total;
    done += s.done;
  });
  return { total, done };
}

function overallStats() {
  let total = 0, done = 0;
  DATA.phases.forEach(p => {
    const s = phaseStats(p);
    total += s.total;
    done += s.done;
  });
  total += SLICE.length;
  done += SLICE.filter(t => getTaskDone(t.id)).length;
  return { total, done };
}

function moduleStatusClass(mod) {
  const { total, done } = moduleStats(mod);
  if (done === total) return "status-done";
  if (done > 0) return "status-progress";
  return "status-pending";
}

function statusBadgeClass(mod) {
  const { total, done } = moduleStats(mod);
  if (done === total) return "done-badge";
  if (done > 0) return "prog-badge";
  return "pend-badge";
}

function statusBadgeText(mod) {
  const { total, done } = moduleStats(mod);
  if (done === total) return "Done";
  if (done > 0) return "In Progress";
  return "Pending";
}

function renderSidebar() {
  const el = document.getElementById("sidebar");
  let html = `<div class="aside-section"><div class="aside-label">Phases</div>`;

  DATA.phases.forEach(phase => {
    const { total, done } = phaseStats(phase);
    const pct = total ? Math.round(done / total * 100) : 0;
    const r = 10, circ = 2 * Math.PI * r;
    const offset = circ - (pct / 100) * circ;

    html += `
      <button class="phase-btn" onclick="scrollToPhase('${phase.id}')" id="btn-${phase.id}">
        <div class="phase-ring">
          <svg width="26" height="26" viewBox="0 0 26 26">
            <circle class="ring-bg" cx="13" cy="13" r="${r}"/>
            <circle class="ring-fill" cx="13" cy="13" r="${r}"
              stroke="${phase.color}"
              stroke-dasharray="${circ}"
              stroke-dashoffset="${offset}"/>
          </svg>
        </div>
        <span class="phase-btn-label">${phase.label}</span>
        <span class="phase-count">${done}/${total}</span>
      </button>`;
  });

  html += `</div>`;
  el.innerHTML = html;
}

function renderMain() {
  const el = document.getElementById("main");
  let html = "";

  const sliceDone = SLICE.filter(t => getTaskDone(t.id)).length;
  html += `
    <div class="section-divider"><div class="divider-line"></div><h2>Vertical Slice Gate</h2><div class="divider-line"></div></div>
    <div class="slice-card">
      <h3>⚡ End-to-End Pipeline Test — ${sliceDone}/${SLICE.length} steps complete</h3>
      <div class="slice-steps">`;

  SLICE.forEach((step, i) => {
    const checked = getTaskDone(step.id);
    html += `<span class="slice-step${checked ? " checked" : ""}" onclick="toggleSlice('${step.id}')" title="${step.label}">${step.label.split("→")[0].split("≤")[0].trim()}</span>`;
    if (i < SLICE.length - 1) html += `<span class="slice-arrow">→</span>`;
  });

  html += `</div>
      <div class="slice-gate"><strong>Gate:</strong> All 10 steps must pass on real hardware before Phase 1 full module build.</div>
    </div>`;

  DATA.phases.forEach(phase => {
    html += `
      <div class="section-divider" id="phase-${phase.id}">
        <div class="divider-line"></div>
        <h2>${phase.label}</h2>
        <div class="divider-line"></div>
      </div>
      <div class="module-grid" id="grid-${phase.id}">`;

    phase.modules.forEach(mod => {
      const { total: mt, done: md } = moduleStats(mod);
      const mpct = mt ? Math.round(md / mt * 100) : 0;
      const statusClass = moduleStatusClass(mod);
      const fillColor = md === mt ? "var(--green)" : md > 0 ? "var(--amber)" : "var(--border)";

      html += `
        <div class="module-card ${statusClass}" id="card-${mod.id}">
          <div class="module-head" onclick="toggleCard('${mod.id}')">
            <div class="module-icon" style="background:${mod.iconBg}">${mod.icon}</div>
            <div class="module-meta">
              <div class="module-name">${mod.name}</div>
              <div class="module-code">${mod.code}</div>
            </div>
            <div class="module-progress">
              <div class="progress-frac">${md}/${mt}</div>
              <div class="module-mini-bar">
                <div class="module-mini-fill" style="width:${mpct}%;background:${fillColor}"></div>
              </div>
            </div>
            <svg class="chevron" width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="task-list">`;

      mod.tasks.forEach(task => {
        const checked = getTaskDone(task.id);
        html += `
            <label class="task-item${checked ? " checked" : ""}" id="task-${task.id}" onclick="toggleTask('${mod.id}','${task.id}')">
              <div class="check-box"></div>
              <span class="task-label">${task.label}</span>
            </label>`;
      });

      html += `</div></div>`;
    });

    html += `</div>`;
  });

  el.innerHTML = html;
}

function updateOverall() {
  const { total, done } = overallStats();
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById("overall-fill").style.width = pct + "%";
  document.getElementById("overall-pct").textContent = pct + "%";
}

function toggleCard(modId) {
  const card = document.getElementById("card-" + modId);
  card.classList.toggle("open");
}

function toggleTask(modId, taskId) {
  const val = !getTaskDone(taskId);
  setTaskDone(taskId, val);

  const taskEl = document.getElementById("task-" + taskId);
  taskEl.classList.toggle("checked", val);

  const phase = DATA.phases.find(p => p.modules.find(m => m.id === modId));
  const mod = phase.modules.find(m => m.id === modId);
  const { total, done } = moduleStats(mod);
  const mpct = total ? Math.round(done / total * 100) : 0;
  const fillColor = done === total ? "var(--green)" : done > 0 ? "var(--amber)" : "var(--border)";

  const card = document.getElementById("card-" + modId);
  card.querySelector(".progress-frac").textContent = `${done}/${total}`;
  card.querySelector(".module-mini-fill").style.width = mpct + "%";
  card.querySelector(".module-mini-fill").style.background = fillColor;
  card.className = `module-card ${moduleStatusClass(mod)}${card.classList.contains("open") ? " open" : ""}`;

  renderSidebar();
  updateOverall();
}

function toggleSlice(taskId) {
  const val = !getTaskDone(taskId);
  setTaskDone(taskId, val);
  const el = document.querySelector(`.slice-step[onclick="toggleSlice('${taskId}')"]`);
  el.classList.toggle("checked", val);

  const done = SLICE.filter(t => getTaskDone(t.id)).length;
  document.querySelector(".slice-card h3").textContent =
    `⚡ End-to-End Pipeline Test — ${done}/${SLICE.length} steps complete`;

  updateOverall();
}

function scrollToPhase(phaseId) {
  const el = document.getElementById("phase-" + phaseId);
  if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
}

renderSidebar();
renderMain();
updateOverall();

DATA.phases.forEach(phase => {
  for (const mod of phase.modules) {
    const { total, done } = moduleStats(mod);
    if (done < total) {
      document.getElementById("card-" + mod.id)?.classList.add("open");
      break;
    }
  }
});
